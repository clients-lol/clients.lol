name: Deploy

on:
  push:
    branches: [main, redesign, cold]
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SST
    if: github.event.action != 'closed'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Determine stage
        id: stage
        run: |
          if [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "cold" ]; then
            echo "stage=cold" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "redesign" ]; then
            echo "stage=redesign" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "stage=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "stage=preview-${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to SST
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Deploying to stage: ${{ steps.stage.outputs.stage }}"
          pnpm sst deploy --stage ${{ steps.stage.outputs.stage }}

      - name: Get deployment URL
        id: url
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Get the URL from SST state
          URL=$(pnpm sst state --stage ${{ steps.stage.outputs.stage }} 2>/dev/null | grep -o 'https://[^ ]*' || echo "")
          if [ -z "$URL" ]; then
            # Fallback to constructing the URL
            if [ "${{ steps.stage.outputs.stage }}" = "cold" ]; then
              URL="https://xvh.lol"
            fi
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.url.outputs.url }}' || 'URL not available';
            const stage = '${{ steps.stage.outputs.stage }}';
            const isProduction = ['cold', 'prod', 'production'].includes(stage);

            const body = isProduction 
              ? `🚀 **Production deployed**: [${url}](${url})`
              : `🚀 **Preview deployed**: [${url}](${url})\n\nStage: \`${stage}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  destroy:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Destroy preview environment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          STAGE="pr-${{ github.event.pull_request.number }}"
          echo "Destroying stage: $STAGE"
          pnpm sst remove --stage $STAGE
