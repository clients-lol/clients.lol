name: PR Review

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Run deterministic PR review
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun ./packages/core/script/review-pr.ts --output review-findings.md

      - name: Draft reviewer comment
        id: draft
        if: hashFiles('review-findings.md') != ''
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_PERMISSION: '{"bash":"deny","edit":"deny","webfetch":"deny"}'
        run: |
          if [ ! -s review-findings.md ]; then
            echo "has_comment=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if COMMENT=$(opencode run --agent pr-reviewer "$(cat review-findings.md)"); then
            echo "opencode reviewer completed"
          else
            COMMENT=""
          fi

          if [ -z "$COMMENT" ]; then
            COMMENT=$(cat review-findings.md)
          fi

          {
            echo "body<<EOF"
            echo "$COMMENT"
            echo "EOF"
            echo "has_comment=true"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update reviewer comment
        if: steps.draft.outputs.has_comment == 'true'
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.draft.outputs.body }}
        with:
          script: |
            const marker = '<!-- pr-reviewer -->';
            const body = process.env.COMMENT_BODY;
            const issue_number = context.payload.pull_request.number;

            if (!body) {
              core.setFailed('COMMENT_BODY was empty.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
